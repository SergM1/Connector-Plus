<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Connector+" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Connector+</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Top search panel -->
  <header class="search-panel" id="searchPanel">
    <div class="brand">
      <span class="brand-mark">C+</span>
      <span class="brand-name">Connector<span class="brand-plus">+</span></span>
    </div>

    <div class="fields">
      <div class="field">
        <span class="dot dot-origin"></span>
        <input id="originInput" type="text" autocomplete="off" placeholder="From" />
        <button class="field-action" id="useLocationBtn" title="Use my location" aria-label="Use my location">
          <span class="msym">my_location</span>
        </button>
        <ul class="suggestions" id="originSuggestions" hidden></ul>
      </div>
      <div class="field">
        <span class="dot dot-dest"></span>
        <input id="destInput" type="text" autocomplete="off" placeholder="To" />
        <button class="field-action" id="swapBtn" title="Swap" aria-label="Swap origin and destination">
          <span class="msym">swap_vert</span>
        </button>
        <ul class="suggestions" id="destSuggestions" hidden></ul>
      </div>
    </div>

    <div class="controls">
      <label class="time-mode">
        <select id="timeMode">
          <option value="depart">Depart</option>
          <option value="arrive">Arrive by</option>
        </select>
      </label>
      <input id="whenInput" type="datetime-local" />
      <button class="go-btn" id="planBtn">Plan</button>
    </div>
  </header>

  <!-- Bottom results sheet -->
  <section class="results-sheet" id="resultsSheet" aria-live="polite">
    <div class="sheet-grip"></div>
    <div class="results-head" id="resultsHead" hidden>
      <h2 id="resultsTitle">Routes</h2>
      <button class="clear-plan" id="clearPlanBtn" title="Clear plan" aria-label="Clear plan">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
    <div class="results-body" id="resultsBody">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"><span class="msym" style="font-size:42px">map</span></div>
        <p>Plan a trip across the Microsoft Connector shuttle <em>and</em> Dublin public transport in one search.</p>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" hidden></div>

  <!-- Live turn-by-turn navigation overlay -->
  <div class="nav-overlay" id="navOverlay" hidden>
    <div class="nav-banner">
      <div class="nav-icon" id="navIcon"><span class="msym" style="font-size:28px">directions_walk</span></div>
      <div class="nav-text">
        <div class="nav-instruction" id="navInstruction">Getting your location…</div>
        <div class="nav-sub" id="navSub"></div>
      </div>
    </div>

    <div class="nav-bottom">
      <button class="nav-recenter" id="navRecenter" title="Re-center" aria-label="Re-center">
        <span class="msym">navigation</span>
      </button>
      <div class="nav-card">
        <div class="nav-eta">
          <span class="nav-eta-main" id="navEtaMain">— min</span>
          <span class="nav-eta-sub" id="navProgress">Calculating…</span>
        </div>
        <button class="nav-exit" id="navExit">End</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
